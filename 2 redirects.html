<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <!-- Automatic redirect -->
    <meta http-equiv="refresh" content="0; url=https://www.instagram.com/">
</head>
<body>
    <p>If you are not redirected automatically, click
        <a href="https://www.instagram.com/">here</a>.
    </p>
</body>
</html>

Or with JavaScript:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        window.location.replace("https://www.instagram.com/");
    </script>

    <p>Redirecting to Instagram...</p>
</body>
</html>

Save either version as index.html and open it in a browser.
